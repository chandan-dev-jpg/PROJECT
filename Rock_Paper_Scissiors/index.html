<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <script src="https://kit.fontawesome.com/6f7cdddf76.js" crossorigin="anonymous"></script>
</head>

<body>

    <!-- Loading Screen -->
    <div id="loading">
        <h1>🎮 Rock Paper Scissors</h1>
        <div class="loader"></div>
    </div>

    <!-- Main Container -->
    <div class="container">

        <!-- Header -->
        <header>

            <div class="logo">
                🎮 Rock Paper Scissors
            </div>

            <div class="menu">

                <button id="soundBtn">
                    <i class="fa-solid fa-volume-high">🔊</i>
                </button>

                <button id="themeBtn">
                    <i class="fa-solid fa-moon">🌙</i>
                </button> 

            </div>

        </header>

        <!-- Hero -->
        <section class="hero">
            <h1>Best Of 5</h1>
            <p>Beat the Computer and become the Champion.</p>
        </section>

        <!-- Score -->
        <section class="scoreBoard">

            <div class="card">
                <h2>You</h2>
                <h1 id="playerScore">0</h1>
            </div>

            <div class="center">
                <h2>Round</h2>
                <h1 id="round">1 / 5</h1>
            </div>

            <div class="card">
                <h2>Computer</h2>
                <h1 id="computerScore">0</h1>
            </div>

        </section>

        <!-- Choices -->
        <section class="choices">

            <button class="choice" data-choice="rock">
                <img src="assets/images/rock.png">
                <h3>Rock</h3>
            </button>

            <button class="choice" data-choice="paper">
                <img src="assets/images/paper.png">
                <h3>Paper</h3>
            </button>

            <button class="choice" data-choice="scissors">
                <img src="assets/images/scissors.png">
                <h3>Scissors</h3>
            </button>

        </section>

        <!-- Selected -->
        <section class="selected">

            <div class="box">
                <h3>Your Choice</h3>
                <img id="playerImage" src="assets/images/player.png">
            </div>

            <div class="box">
                <h3>Computer Choice</h3>
                <img id="computerImage" src="assets/images/question.png">
            </div>

        </section>

        <!-- Result -->
        <section class="result">
            <h2 id="resultText">Choose Your Move</h2>
        </section>

        <!-- Buttons -->
        <section class="buttons">

            <button id="restartBtn">
                🔄 Restart
            </button>

            <button id="historyBtn">
                📜 History
            </button>

        </section>

        <!-- Footer -->
        <footer>

            <h3>
                🏆 Best Score :
                <span id="bestScore">0</span>
            </h3>

        </footer>

    </div>

    <!-- Winner Popup -->
    <div class="popup" id="popup">

        <div class="popupContent">

            <h1 id="popupTitle">
                🎉 You Won
            </h1>

            <button id="playAgain">
                Play Again
            </button>

        </div>

    </div>

    <!-- History Popup -->
    <div class="popup" id="historyPopup">

        <div class="popupContent historyPopupContent">

            <div class="historyHeader">

                <h2>📜 Match History</h2>

                <button id="closeHistory" class="closeBtn">
                    ✖
                </button>

            </div>

            <div id="historyList" class="historyList">

            </div>

            <button id="clearHistory" class="clearBtn">
                🗑 Clear History
            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
